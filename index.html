<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚽ Porra Mundialista · Registro independiente</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
        body { background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%); margin: 0; padding: 20px; color: #f0f3f0; }
        .dashboard { max-width: 1600px; margin: 0 auto; background: rgba(10, 25, 15, 0.75); backdrop-filter: blur(3px); border-radius: 3rem; padding: 1.5rem 2rem; }
        h1 { display: flex; align-items: center; gap: 12px; font-size: 2rem; background: linear-gradient(135deg, #FFD966, #FFB347); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .login-panel, .admin-panel { background: #0f2c1c; border-radius: 2rem; padding: 1.5rem; margin-bottom: 2rem; border: 1px solid #ffd966; }
        input, button { background: #2c4a35; border: none; padding: 10px 18px; border-radius: 50px; color: white; margin: 5px; }
        button { background: #f5b042; color: #1e3a2f; font-weight: bold; cursor: pointer; }
        .btn-registro { background: #2c6e3c; color: white; }
        .matches-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 22px; margin-top: 20px; }
        .match-card { background: #132a1d; border-radius: 28px; padding: 18px; border-left: 6px solid #f5b042; }
        .deadline { font-size: 0.7rem; background: #00000066; padding: 2px 8px; border-radius: 20px; }
        .radio-group { display: flex; gap: 15px; margin: 12px 0; flex-wrap: wrap; }
        .btn-vote { width: 100%; margin-top: 8px; }
        .admin-controls { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; border-top: 1px solid #ffd96660; padding-top: 12px; }
        .leaderboard { background: #0b2217cc; border-radius: 28px; padding: 1rem; margin-bottom: 2rem; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px; border-bottom: 1px solid #3b644b; }
        .cerrado { background: #9e3c1c; display: inline-block; padding: 2px 12px; border-radius: 50px; font-size: 0.7rem; }
        .user-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logout-btn { background: #c0392b; color: white; }
        .form-group { display: inline-block; margin: 10px; }
        hr { border-color: #ffd96640; margin: 20px 0; }
    </style>
</head>
<body>
<div id="loginContainer" class="dashboard">
    <div class="login-panel">
        <h1>🏆 PORRA MUNDIALISTA</h1>
        <p>Regístrate o inicia sesión con tu usuario y contraseña</p>
        
        <div style="display: flex; flex-wrap: wrap; gap: 20px; justify-content: space-between;">
            <!-- FORMULARIO DE LOGIN -->
            <div style="flex: 1; min-width: 200px;">
                <h3>🔐 Iniciar sesión</h3>
                <input type="text" id="loginName" placeholder="Usuario">
                <input type="password" id="loginPassword" placeholder="Contraseña">
                <button id="loginBtn">Iniciar sesión</button>
            </div>

            <!-- FORMULARIO DE REGISTRO (INDEPENDIENTE) -->
            <div style="flex: 1; min-width: 200px;">
                <h3>✨ Registrarse</h3>
                <input type="text" id="regName" placeholder="Nuevo usuario">
                <input type="password" id="regPassword" placeholder="Contraseña">
                <button id="registerBtn" class="btn-registro">Crear cuenta y entrar</button>
            </div>
        </div>
        <div style="margin-top: 20px; font-size: 0.8rem; text-align: center;">
            💡 El administrador por defecto es <strong>admin / admin123</strong>
        </div>
    </div>
</div>

<div id="appContainer" class="dashboard" style="display: none;">
    <div class="user-info">
        <div>👤 <span id="userName"></span> <span id="adminBadge" style="background: #f5b042; padding: 2px 10px; border-radius: 20px; margin-left: 10px;"></span></div>
        <button id="logoutBtn" class="logout-btn">🚪 Cerrar sesión</button>
    </div>

    <div id="adminPanel" style="display: none;" class="admin-panel">
        <h3>🔧 Panel de Administración</h3>
        <div>
            <input type="text" id="newUserName" placeholder="Nuevo usuario">
            <input type="password" id="newUserPass" placeholder="Contraseña">
            <label><input type="checkbox" id="newUserAdmin"> ¿Admin?</label>
            <button id="createUserBtn">➕ Crear usuario</button>
        </div>
        <div>
            <h4>Usuarios existentes</h4>
            <ul id="userList"></ul>
        </div>
    </div>

    <div class="leaderboard">
        <h3>🏅 Clasificación</h3>
        <div id="leaderboardTable"></div>
    </div>

    <h3>📅 Partidos · Vota antes del cierre</h3>
    <div id="matchesGrid" class="matches-grid"></div>
</div>

<script>
    let token = null;
    let currentUser = null;
    let matches = [];
    let myVotes = {};
    let results = {};

    const apiCall = async (url, options = {}) => {
        options.headers = options.headers || {};
        if (token) options.headers['Authorization'] = token;
        options.headers['Content-Type'] = 'application/json';
        const res = await fetch(url, options);
        if (res.status === 401) {
            alert('Sesión expirada. Vuelve a iniciar sesión.');
            logout();
            return null;
        }
        return res;
    };

    // Registro público
    const registrar = async () => {
        const name = document.getElementById('regName').value.trim();
        const password = document.getElementById('regPassword').value;
        if (!name || !password) return alert('Completa nombre y contraseña');
        const res = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, password, isAdmin: false })
        });
        const data = await res.json();
        if (!res.ok) return alert(data.error || 'Error al registrar');
        alert('Usuario registrado con éxito. Ahora inicia sesión.');
        // Rellenar campos de login con los datos registrados
        document.getElementById('loginName').value = name;
        document.getElementById('loginPassword').value = password;
        // Opcional: iniciar sesión automáticamente
        iniciarSesion();
    };

    const iniciarSesion = async () => {
        const name = document.getElementById('loginName').value;
        const password = document.getElementById('loginPassword').value;
        if (!name || !password) return alert('Completa usuario y contraseña');
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, password })
        });
        const data = await res.json();
        if (!res.ok) return alert(data.error);
        token = data.token;
        currentUser = data;
        localStorage.setItem('porraToken', token);
        document.getElementById('loginContainer').style.display = 'none';
        document.getElementById('appContainer').style.display = 'block';
        document.getElementById('userName').innerText = currentUser.name;
        if (currentUser.isAdmin) {
            document.getElementById('adminBadge').innerText = '👑 Admin';
            document.getElementById('adminPanel').style.display = 'block';
        } else {
            document.getElementById('adminBadge').innerText = '';
            document.getElementById('adminPanel').style.display = 'none';
        }
        cargarDatos();
    };

    const logout = () => {
        token = null;
        currentUser = null;
        localStorage.removeItem('porraToken');
        document.getElementById('loginContainer').style.display = 'block';
        document.getElementById('appContainer').style.display = 'none';
        // Limpiar campos
        document.getElementById('loginName').value = '';
        document.getElementById('loginPassword').value = '';
        document.getElementById('regName').value = '';
        document.getElementById('regPassword').value = '';
    };

    const cargarDatos = async () => {
        const resMatches = await apiCall('/api/matches');
        const resVotes = await apiCall('/api/votes');
        const resResults = await apiCall('/api/results');
        if (resMatches && resVotes && resResults) {
            matches = await resMatches.json();
            myVotes = await resVotes.json();
            results = await resResults.json();
            if (currentUser.isAdmin) cargarUsuarios();
            renderLeaderboard();
            renderMatches();
        }
    };

    const renderLeaderboard = async () => {
        const res = await apiCall('/api/leaderboard');
        if (!res) return;
        const data = await res.json();
        let html = `<table><thead><tr><th>Participante</th><th>⭐ Puntos</th></tr></thead><tbody>`;
        data.forEach(p => {
            html += `<tr><td>${escapeHtml(p.name)}</td><td class="puntos">${p.points || 0}</td></tr>`;
        });
        html += `</tbody></table>`;
        document.getElementById('leaderboardTable').innerHTML = html;
    };

    const renderMatches = () => {
        const grid = document.getElementById('matchesGrid');
        if (!matches.length) return;
        let html = '';
        const ahora = new Date();
        for (let m of matches) {
            const deadline = new Date(m.match_datetime);
            const cerrado = ahora > deadline;
            const resultado = results[m.id];
            const miVoto = myVotes[m.id];
            const votoTexto = miVoto ? (miVoto === 'home' ? m.home : (miVoto === 'draw' ? 'Empate' : m.away)) : 'Sin pronóstico';
            let resultadoTexto = '';
            if (resultado) {
                resultadoTexto = resultado === 'home' ? `🏆 ${m.home}` : (resultado === 'draw' ? '🤝 Empate' : `🏆 ${m.away}`);
            }
            html += `
                <div class="match-card">
                    <div class="match-date">📅 ${m.date} · ${m.stage} <span class="deadline">⏰ Cierra: ${deadline.toLocaleString()}</span></div>
                    <div class="teams"><strong>${m.home}</strong> vs <strong>${m.away}</strong></div>
                    <div>🗳️ Tu pronóstico: ${votoTexto}</div>
            `;
            if (!cerrado && !resultado) {
                html += `
                    <div class="radio-group" id="radio-${m.id}">
                        <label><input type="radio" name="vote_${m.id}" value="home" ${miVoto === 'home' ? 'checked' : ''}> ${m.home}</label>
                        <label><input type="radio" name="vote_${m.id}" value="draw" ${miVoto === 'draw' ? 'checked' : ''}> 🤝 Empate</label>
                        <label><input type="radio" name="vote_${m.id}" value="away" ${miVoto === 'away' ? 'checked' : ''}> ${m.away}</label>
                    </div>
                    <button class="btn-vote" data-id="${m.id}">💾 Guardar voto</button>
                `;
            } else if (cerrado && !resultado) {
                html += `<div class="cerrado">⏰ Votación cerrada</div>`;
            } else {
                html += `<div class="resultado-real">🏁 Resultado: ${resultadoTexto} ${miVoto === resultado ? '✅ +1 punto' : ''}</div>`;
            }
            if (currentUser.isAdmin) {
                html += `<div class="admin-controls">
                            ${!resultado ? `
                                <button class="admin-result" data-id="${m.id}" data-res="home">🏠 ${m.home}</button>
                                <button class="admin-result" data-id="${m.id}" data-res="draw">🤝 Empate</button>
                                <button class="admin-result" data-id="${m.id}" data-res="away">✈️ ${m.away}</button>
                            ` : `
                                <button class="admin-clear" data-id="${m.id}">🗑️ Borrar resultado</button>
                            `}
                            <button class="admin-edit-date" data-id="${m.id}" data-datetime="${m.match_datetime}">📅 Editar cierre</button>
                         </div>`;
            }
            html += `</div>`;
        }
        grid.innerHTML = html;
        // Eventos de votación
        document.querySelectorAll('.btn-vote').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const matchId = btn.dataset.id;
                const selected = document.querySelector(`input[name="vote_${matchId}"]:checked`);
                if (!selected) return alert('Selecciona un resultado');
                const res = await apiCall('/api/vote', {
                    method: 'POST',
                    body: JSON.stringify({ matchId, vote: selected.value })
                });
                const data = await res.json();
                if (res.ok) {
                    alert('Voto guardado (no se puede cambiar)');
                    cargarDatos();
                } else {
                    alert(data.error);
                }
            });
        });
        // Eventos de admin
        if (currentUser.isAdmin) {
            document.querySelectorAll('.admin-result').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const matchId = btn.dataset.id;
                    const result = btn.dataset.res;
                    await apiCall('/api/results', { method: 'POST', body: JSON.stringify({ matchId, result }) });
                    cargarDatos();
                });
            });
            document.querySelectorAll('.admin-clear').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const matchId = btn.dataset.id;
                    await apiCall('/api/results', { method: 'POST', body: JSON.stringify({ matchId, result: null }) });
                    cargarDatos();
                });
            });
            document.querySelectorAll('.admin-edit-date').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const matchId = btn.dataset.id;
                    const newDate = prompt('Nueva fecha y hora (ISO local, ej: 2026-06-11T15:00:00)', btn.dataset.datetime);
                    if (newDate && !isNaN(Date.parse(newDate))) {
                        await apiCall('/api/matches/datetime', { method: 'POST', body: JSON.stringify({ matchId, datetime: newDate }) });
                        cargarDatos();
                    }
                });
            });
        }
    };

    const cargarUsuarios = async () => {
        const res = await apiCall('/api/users');
        if (!res) return;
        const users = await res.json();
        let html = '<ul>';
        users.forEach(u => {
            html += `<li>${escapeHtml(u.name)} ${u.is_admin ? '(admin)' : ''} <button onclick="borrarUsuario(${u.id})">❌</button></li>`;
        });
        html += '</ul>';
        document.getElementById('userList').innerHTML = html;
    };
    window.borrarUsuario = async (userId) => {
        if (!confirm('¿Eliminar usuario y todos sus votos?')) return;
        await apiCall(`/api/users/${userId}`, { method: 'DELETE' });
        cargarUsuarios();
        renderLeaderboard();
    };
    document.getElementById('createUserBtn').onclick = async () => {
        const name = document.getElementById('newUserName').value;
        const password = document.getElementById('newUserPass').value;
        const isAdmin = document.getElementById('newUserAdmin').checked;
        if (!name || !password) return alert('Completa nombre y contraseña');
        const res = await apiCall('/api/register', {
            method: 'POST',
            body: JSON.stringify({ name, password, isAdmin })
        });
        if (res.ok) {
            alert('Usuario creado');
            document.getElementById('newUserName').value = '';
            document.getElementById('newUserPass').value = '';
            document.getElementById('newUserAdmin').checked = false;
            cargarUsuarios();
        } else {
            const err = await res.json();
            alert(err.error);
        }
    };
    function escapeHtml(str) { return str.replace(/[&<>]/g, (m) => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;')); }

    // Eventos de la interfaz de login/registro
    document.getElementById('loginBtn').onclick = iniciarSesion;
    document.getElementById('registerBtn').onclick = registrar;
    document.getElementById('logoutBtn').onclick = logout;

    // Comprobar si ya hay sesión guardada
    window.onload = () => {
        const savedToken = localStorage.getItem('porraToken');
        if (savedToken) {
            token = savedToken;
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('appContainer').style.display = 'block';
            // Intento cargar datos; si falla, logout
            cargarDatos().catch(() => logout());
        }
    };
</script>
</body>
</html>
